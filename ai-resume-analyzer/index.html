<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Resume Analyzer — Analyze, optimize, and match your resume with any job in seconds using Google Gemini AI." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>AI Resume Analyzer — Match & Optimize with Gemini AI</title>
    <!-- Anti-flash: apply theme before React renders to prevent light→dark flicker -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('ai-resume-theme');
          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
          } else {
            // Default to dark
            document.documentElement.classList.remove('light');
            document.documentElement.classList.add('dark');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
